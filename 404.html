<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>404 — Workspace Not Found · Domation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://domation.net/imgs/ICON.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a;
            color: #0f172a;
            min-height: 100vh;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 2rem 1.5rem;
            box-sizing: border-box;
            position: relative;
        }
        
        /* Fixed Animated Background */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #0f172a;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 12s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: rgba(245, 158, 11, 0.15);
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            width: 600px;
            height: 600px;
            background: rgba(59, 130, 246, 0.15);
            bottom: -20%;
            right: -10%;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: rgba(16, 185, 129, 0.1);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -8s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -40px) scale(1.1); }
        }

        .box { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            padding: 4rem 3rem; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 450px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }
        .icon-wrap { 
            width: 80px; 
            height: 80px; 
            background: #fef3c7; 
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 1.5rem; 
            box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.2);
        }
        h2 { 
            color: #0f172a; 
            margin: 0 0 1rem; 
            font-weight: 800; 
            font-size: 2rem; 
            letter-spacing: -0.02em; 
        }
        p { 
            color: #64748b; 
            margin: 0 0 2.5rem; 
            font-size: 1.05rem; 
            line-height: 1.6; 
        }
        .btns { 
            display: flex; 
            gap: 1rem; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        .btn { 
            display: inline-block; 
            padding: 1rem 1.8rem; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 1rem;
            transition: all 0.2s; 
        }
        .btn-home { 
            background: #f1f5f9; 
            color: #334155; 
            border: 1px solid #e2e8f0; 
        }
        .btn-home:hover { 
            background: #e2e8f0; 
            color: #0f172a;
        }
        .btn-new { 
            background: #f59e0b; 
            color: #fff; 
            box-shadow: 0 4px 10px rgba(245,158,11,0.2); 
            border: 1px solid transparent;
        }
        .btn-new:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 12px rgba(245,158,11,0.3); 
            background: #d97706;
        }
    </style>
</head>
<body>
    <div class="bg-animated">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>
    
    <div class="box">
        <div class="icon-wrap">
            <img src="https://domation.net/imgs/ICON.png" alt="DOMATION Logo" style="width: 50px; height: 50px; object-fit: contain;">
        </div>
        <h2>Workspace Not Found</h2>
        <p>Workspace này không tồn tại hoặc đã bị xóa.<br>Vui lòng kiểm tra lại đường link.</p>
        <div class="btns">
            <a href="https://meta.domation.net" class="btn btn-home">Quay Về Trang Chủ</a>
            <a href="/register" class="btn btn-new">Tạo Workspace Mới</a>
        </div>
    </div>
</body>
</html>
