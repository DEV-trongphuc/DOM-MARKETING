<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspaces — Domation</title>
    <meta name="description" content="Chọn workspace để xem báo cáo Meta Ads realtime của bạn.">
    <link rel="icon" href="https://domation.net/imgs/ICON.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="./lib/config_env.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --amber: #f59e0b;
            --amber-d: #d97706;
            --amber-glow: rgba(245,158,11,0.2);
            --surface: rgba(255,255,255,0.98);
            --border: #e8edf3;
            --muted: #64748b;
            --dark: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* background */
        .bg-wrap {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 15% 10%, rgba(245,158,11,.13) 0%, transparent 70%),
                radial-gradient(ellipse 50% 60% at 85% 90%, rgba(59,130,246,.1) 0%, transparent 70%),
                #0f172a;
        }
        .bg-grid {
            position: fixed; inset: 0; z-index: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
            background-size: 44px 44px;
        }

        /* card shell */
        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 480px;
            background: var(--surface);
            border-radius: 26px;
            box-shadow: 0 32px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.07);
            overflow: hidden;
            animation: cardIn .45s cubic-bezier(.16,1,.3,1) both;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(24px) scale(.97); }
            to   { opacity:1; transform:none; }
        }

        /* top gradient bar */
        .top-bar { height: 3px; background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 50%, #34d399 100%); }

        /* ── HEADER (logo + title centered, user pill bên phải) ── */
        .hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.6rem 2rem 0;
            gap: 1rem;
        }
        .brand {
            display: flex; align-items: center; gap: .75rem;
        }
        .brand-img {
            width: 42px; height: 42px; border-radius: 12px;
            overflow: hidden; flex-shrink: 0;
            box-shadow: 0 4px 14px var(--amber-glow);
            background: #fef3c7;
        }
        .brand-img img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .brand-text h1 {
            font-size: 1.15rem; font-weight: 900; color: var(--dark);
            letter-spacing: -.03em; line-height: 1;
        }
        .brand-text p {
            font-size: .6rem; font-weight: 700; color: #94a3b8;
            letter-spacing: .12em; text-transform: uppercase; margin-top: 3px;
        }
        .brand-text span { color: var(--amber); }

        /* user pill (shown when logged in) */
        .user-pill {
            display: none;
            align-items: center; gap: .55rem;
            background: #f8fafc; border: 1.5px solid var(--border);
            border-radius: 99px; padding: .35rem .7rem .35rem .35rem;
            cursor: pointer; transition: border-color .2s;
            max-width: 180px;
        }
        .user-pill:hover { border-color: #cbd5e1; }
        .user-pill.visible { display: flex; }
        .pill-av {
            width: 28px; height: 28px; border-radius: 50%;
            background: linear-gradient(135deg,#f59e0b,#d97706);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: .75rem; color: #fff;
            flex-shrink: 0; overflow: hidden;
        }
        .pill-av img { width: 100%; height: 100%; border-radius: 50%; }
        .pill-name {
            font-size: .75rem; font-weight: 700; color: var(--dark);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 100px;
        }
        .pill-out {
            font-size: .65rem; color: #94a3b8;
            flex-shrink: 0; margin-left: 2px;
        }

        /* body padding */
        .body { padding: 1.4rem 2rem 2rem; }

        /* subtitle */
        .subtitle {
            font-size: .88rem; color: var(--muted);
            text-align: center; margin: 1rem 0 1.6rem;
            line-height: 1.5;
        }

        /* step */
        .step { display: none; }
        .step.active { display: block; animation: fadeUp .32s cubic-bezier(.16,1,.3,1) both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

        /* ── SIGN IN BOX ── */
        .signin-box {
            background: #f8fafc;
            border: 1.5px dashed #d1d5db;
            border-radius: 18px;
            padding: 2rem 1.6rem;
            text-align: center;
        }
        .g-circle {
            width: 52px; height: 52px; margin: 0 auto .9rem;
            background: linear-gradient(135deg,#4285F4,#34A853);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 18px rgba(66,133,244,.28);
        }
        .signin-box h2 { font-size: 1.1rem; font-weight: 800; color: var(--dark); margin-bottom: .3rem; }
        .signin-box p  { font-size: .83rem; color: var(--muted); }
        .google-wrap { display: flex; justify-content: center; margin-top: 1.3rem; min-height: 44px; }

        /* ── SKELETON ── */
        .skeleton-list { display: flex; flex-direction: column; gap: .7rem; }
        .skel {
            height: 72px; border-radius: 14px;
            background: linear-gradient(90deg,#f1f5f9 25%,#e8ecf1 50%,#f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.3s infinite;
        }
        .skel:nth-child(2){animation-delay:.12s;opacity:.8}
        .skel:nth-child(3){animation-delay:.24s;opacity:.6}
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .load-lbl {
            text-align: center; font-size: .8rem; color: #94a3b8;
            margin-top: .9rem; display: flex; align-items: center; justify-content: center; gap: .45rem;
        }

        /* ── WORKSPACE CARDS ── */
        .ws-list { display: flex; flex-direction: column; gap: .55rem; max-height: 340px; overflow-y: auto; padding-right: 2px; }
        .ws-list::-webkit-scrollbar { width: 4px; }
        .ws-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        .ws-card {
            display: flex; align-items: center; gap: .9rem;
            padding: 1rem 1.1rem;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            cursor: pointer; text-decoration: none; color: inherit;
            transition: border-color .18s, transform .18s, box-shadow .18s;
            position: relative; overflow: hidden;
        }
        .ws-card:hover {
            border-color: var(--amber);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--amber-glow);
        }

        /* left accent */
        .ws-card::before {
            content:''; position:absolute; left:0; top:12px; bottom:12px; width:3px;
            background: linear-gradient(180deg,#f59e0b,#fbbf24);
            border-radius: 0 3px 3px 0;
            transform: scaleY(0); transition: transform .18s;
            transform-origin: bottom;
        }
        .ws-card:hover::before { transform: scaleY(1); }

        /* icon block */
        .ws-icon {
            width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
            background: linear-gradient(135deg,#fef3c7,#fde68a);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #d97706;
        }

        /* info */
        .ws-info { flex: 1; min-width: 0; }
        .ws-name {
            font-size: .95rem; font-weight: 800; color: var(--dark);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: .28rem;
        }
        .ws-tags { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
        .ws-slug { font-size: .7rem; color: var(--muted); font-family: monospace; }

        .tag {
            font-size: .62rem; font-weight: 800; padding: .16rem .45rem;
            border-radius: 20px; text-transform: uppercase; letter-spacing: .04em;
        }
        .tag-owner  { background: #fef3c7; color: #b45309; }
        .tag-viewer { background: #e0e7ff; color: #4338ca; }
        .tag-active  { background: #dcfce7; color: #15803d; }
        .tag-trial   { background: #fef9c3; color: #a16207; }
        .tag-expired { background: #fee2e2; color: #b91c1c; }

        /* expire pill */
        .expire-pill {
            display: inline-flex; align-items: center; gap: .28rem;
            font-size: .68rem; font-weight: 700;
            margin-top: .28rem; color: #94a3b8;
        }
        .expire-pill.warn { color: #d97706; }
        .expire-pill.danger { color: #ef4444; }

        /* chevron */
        .ws-arrow {
            font-size: .8rem; color: #d1d5db; flex-shrink: 0;
            transition: color .18s, transform .18s;
        }
        .ws-card:hover .ws-arrow { color: var(--amber); transform: translateX(3px); }

        /* ── CREATE BUTTON ── */
        .btn-create {
            width: 100%; margin-top: .8rem;
            padding: .85rem;
            background: transparent;
            border: 1.5px dashed #d1d5db;
            border-radius: 13px;
            font-family: 'Inter', sans-serif;
            font-size: .85rem; font-weight: 700; color: #94a3b8;
            cursor: pointer; transition: all .18s;
            display: flex; align-items: center; justify-content: center; gap: .5rem;
        }
        .btn-create:hover { border-color: var(--amber); color: var(--amber-d); background: #fffbeb; }

        /* error */
        .err-box {
            background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
            padding: .75rem 1rem; font-size: .82rem; color: #b91c1c;
            display: flex; align-items: center; gap: .5rem; margin-bottom: .9rem;
        }

        /* empty */
        .empty { text-align: center; padding: 1.8rem 0; }
        .empty i { font-size: 2rem; color: #d1d5db; margin-bottom: .6rem; display: block; }
        .empty p { color: var(--muted); font-size: .85rem; line-height: 1.6; }

        /* footer */
        .footer {
            text-align: center; font-size: .68rem; color: #94a3b8;
            margin-top: 1.4rem; letter-spacing: .02em;
        }
        .footer a { color: #94a3b8; text-decoration: none; }
        .footer a:hover { color: var(--amber); }

        /* signout dropdown */
        .signout-tip {
            position: absolute; right: 2rem; top: 4.2rem;
            background: #fff; border: 1.5px solid var(--border);
            border-radius: 12px; padding: .5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,.12);
            z-index: 100; display: none; animation: fadeUp .2s ease;
        }
        .signout-tip.open { display: block; }
        .signout-btn {
            width: 100%; padding: .6rem 1rem;
            background: none; border: none; border-radius: 8px;
            font-family: 'Inter', sans-serif; font-size: .82rem; font-weight: 700;
            color: #ef4444; cursor: pointer; white-space: nowrap;
            display: flex; align-items: center; gap: .5rem;
            transition: background .15s;
        }
        .signout-btn:hover { background: #fef2f2; }
    </style>
</head>
<body>
<div class="bg-wrap"></div>
<div class="bg-grid"></div>

<div class="card">
    <div class="top-bar"></div>

    <!-- Header row -->
    <div class="hdr">
        <div class="brand">
            <div class="brand-img">
                <img src="https://domation.net/imgs/ICON.png" alt="Domation">
            </div>
            <div class="brand-text">
                <h1>DOMATION</h1>
                <p><span>/</span> REALTIME META REPORT</p>
            </div>
        </div>

        <!-- User pill — shown after login -->
        <div class="user-pill" id="user_pill" onclick="toggleSignout()">
            <div class="pill-av" id="pill_av">U</div>
            <span class="pill-name" id="pill_name">User</span>
            <i class="fa-solid fa-chevron-down pill-out" style="font-size:.55rem;"></i>
        </div>

        <!-- Signout dropdown -->
        <div class="signout-tip" id="signout_tip">
            <button class="signout-btn" onclick="doSignOut()">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </button>
        </div>
    </div>

    <div class="body">
        <p class="subtitle" id="main_subtitle">Đăng nhập để xem workspace của bạn</p>

        <!-- Step 1: Sign in -->
        <div id="step_1" class="step active">
            <div class="signin-box">
                <div class="g-circle">
                    <i class="fab fa-google" style="color:#fff;font-size:1.3rem;"></i>
                </div>
                <h2>Xác Thực Tài Khoản</h2>
                <p>Sử dụng Google để đăng nhập an toàn</p>
                <div class="google-wrap" id="google_btn_render_area"></div>
                <p id="google_error_text" style="display:none;color:#ef4444;font-size:.8rem;margin-top:.8rem;">
                    <i class="fa-solid fa-circle-exclamation"></i> Chưa cấu hình GOOGLE_CLIENT_ID.
                </p>
            </div>
        </div>

        <!-- Step loading -->
        <div id="loading_state" class="step">
            <div class="skeleton-list">
                <div class="skel"></div>
                <div class="skel"></div>
                <div class="skel"></div>
            </div>
            <div class="load-lbl">
                <i class="fa-solid fa-circle-notch fa-spin" style="color:#f59e0b;"></i>
                Đang tải danh sách workspace...
            </div>
        </div>

        <!-- Step 2: List -->
        <div id="step_2" class="step">
            <div id="error_box" class="err-box" style="display:none;">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="error_text"></span>
            </div>
            <div class="ws-list" id="workspace_list_container"></div>
            <button class="btn-create" onclick="window.location.href='/register'">
                <i class="fa-solid fa-plus"></i> Khởi tạo Workspace mới
            </button>
        </div>

        <div class="footer">
            Powered by <a href="https://domation.net" target="_blank">Domation</a> &mdash; Meta Realtime Analytics
        </div>
    </div>
</div>

<script>
    const SESSION_KEY = 'dom_auth_v1';
    const SESSION_TTL = 30 * 24 * 60 * 60 * 1000;

    // Close dropdown on outside click
    document.addEventListener('click', e => {
        if (!e.target.closest('#user_pill') && !e.target.closest('#signout_tip')) {
            document.getElementById('signout_tip').classList.remove('open');
        }
    });

    function toggleSignout() {
        document.getElementById('signout_tip').classList.toggle('open');
    }

    function showStep(id) {
        document.querySelectorAll('.step').forEach(el => {
            el.classList.remove('active'); el.style.display = 'none';
        });
        const el = document.getElementById(id);
        if (el) { el.style.display = 'block'; requestAnimationFrame(() => el.classList.add('active')); }
    }

    function doSignOut() {
        localStorage.removeItem(SESSION_KEY);
        sessionStorage.clear();
        if (typeof google !== 'undefined') google.accounts?.id?.disableAutoSelect();
        location.reload();
    }

    function setUserPill(u) {
        const av   = document.getElementById('pill_av');
        const name = document.getElementById('pill_name');
        if (u.picture) {
            av.innerHTML = `<img src="${u.picture}">`;
        } else {
            av.textContent = (u.name || u.email || 'U').charAt(0).toUpperCase();
        }
        name.textContent = u.name || u.email.split('@')[0];
        document.getElementById('user_pill').classList.add('visible');
    }

    function getDaysLeft(expiresAt) {
        if (!expiresAt) return null;
        return Math.ceil((new Date(expiresAt) - new Date()) / 86400000);
    }

    function renderTenants(tenants) {
        const container = document.getElementById('workspace_list_container');
        if (!tenants || tenants.length === 0) {
            container.innerHTML = `<div class="empty">
                <i class="fa-regular fa-folder-open"></i>
                <p>Bạn chưa có workspace nào.<br>Tạo mới để bắt đầu.</p>
            </div>`;
            return;
        }

        const icons = ['fa-chart-line','fa-bullhorn','fa-rocket','fa-store','fa-fire','fa-gem','fa-bolt','fa-star'];

        container.innerHTML = tenants.map((t, i) => {
            const isOwner = t.role === 'owner';
            const roleTag = isOwner
                ? `<span class="tag tag-owner">Chủ sở hữu</span>`
                : `<span class="tag tag-viewer">Thành viên</span>`;

            let statusTag = `<span class="tag tag-trial">TRIAL</span>`;
            if (t.status === 'active')  statusTag = `<span class="tag tag-active">ACTIVE</span>`;
            if (t.status === 'expired' || t.status === 'locked') statusTag = `<span class="tag tag-expired">HẾT HẠN</span>`;

            const days = getDaysLeft(t.expires_at);
            let expireHtml = '';
            if (days !== null) {
                const cls  = days <= 0 ? 'danger' : days <= 7 ? 'warn' : '';
                const ico  = days <= 0 ? 'fa-calendar-xmark' : days <= 7 ? 'fa-clock' : 'fa-calendar';
                const lbl  = days <= 0 ? 'Đã hết hạn' : days === 1 ? 'Còn 1 ngày' : `Còn ${days} ngày`;
                expireHtml = `<div class="expire-pill ${cls}"><i class="fa-regular ${ico}"></i>${lbl}</div>`;
            }

            return `<a class="ws-card" href="/${t.slug}">
                <div class="ws-icon"><i class="fa-solid ${icons[i % icons.length]}"></i></div>
                <div class="ws-info">
                    <div class="ws-name">${t.name}</div>
                    <div class="ws-tags">
                        <span class="ws-slug">/${t.slug}</span>
                        ${roleTag}
                        ${statusTag}
                    </div>
                    ${expireHtml}
                </div>
                <i class="fa-solid fa-chevron-right ws-arrow"></i>
            </a>`;
        }).join('');
    }

    async function fetchUserTenants(email) {
        try {
            const res  = await fetch(`${window.APP_CONFIG.SAAS_API_URL}?action=get_user_tenants&email=${encodeURIComponent(email)}`);
            const data = await res.json();
            if (!data.ok) throw new Error(data.error);
            if (!data.data || data.data.length === 0) { window.location.href = '/register'; return; }
            renderTenants(data.data);
            showStep('step_2');
        } catch (e) {
            document.getElementById('error_text').textContent = 'Lỗi kết nối: ' + e.message;
            document.getElementById('error_box').style.display = 'flex';
            showStep('step_2');
        }
    }

    function handleGoogleLogin(response) {
        try {
            const b64 = response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
            const p   = JSON.parse(decodeURIComponent(escape(atob(b64))));
            if (!p.email) throw new Error('No email');
            const u = { email: p.email, name: p.name || p.email.split('@')[0], picture: p.picture || '', status: 'active' };
            try { localStorage.setItem(SESSION_KEY, JSON.stringify({ u, ts: Date.now() })); } catch(_) {}
            setUserPill(u);
            document.getElementById('main_subtitle').textContent = 'Chọn workspace để bắt đầu';
            showStep('loading_state');
            fetchUserTenants(p.email);
        } catch(e) { alert('Lỗi xác thực Google. Vui lòng thử lại.'); }
    }

    window.onload = function() {
        // Auto-login from cache
        try {
            const s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
            if (s && s.u && s.u.email && s.ts && (Date.now() - s.ts < SESSION_TTL)) {
                setUserPill(s.u);
                document.getElementById('main_subtitle').textContent = 'Chọn workspace để bắt đầu';
                showStep('loading_state');
                fetchUserTenants(s.u.email);
                return;
            }
            if (s && !s.ts) localStorage.removeItem(SESSION_KEY);
        } catch(_) {}

        // Render Google button
        if (!window.APP_CONFIG?.GOOGLE_CLIENT_ID) {
            document.getElementById('google_error_text').style.display = 'block';
        } else {
            const tryRender = () => {
                if (typeof google !== 'undefined' && google.accounts) {
                    google.accounts.id.initialize({
                        client_id: window.APP_CONFIG.GOOGLE_CLIENT_ID,
                        callback: handleGoogleLogin,
                        auto_select: false,
                        ux_mode: 'popup'
                    });
                    google.accounts.id.renderButton(
                        document.getElementById('google_btn_render_area'),
                        { theme: 'outline', size: 'large', shape: 'pill', text: 'signin_with', logo_alignment: 'left', width: 260 }
                    );
                    google.accounts.id.prompt();
                } else { setTimeout(tryRender, 200); }
            };
            tryRender();
        }
    };
</script>
</body>
</html>
