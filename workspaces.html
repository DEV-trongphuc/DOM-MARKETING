<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Workspace - DOM META SAAS</title>
    <link rel="icon" href="http://localhost:3000/imgs/ICON.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Cấu hình API -->
    <script src="./lib/config_env.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --primary: #f59e0b;
            --primary-dark: #d97706;
            --primary-light: #fef3c7;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --border-color: #e2e8f0;
        }

        body { 
            margin: 0; 
            font-family: 'Roboto', sans-serif; 
            background-color: #0f172a; 
            color: var(--text-dark); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 2rem;
            box-sizing: border-box;
            position: relative;
        }

        /* Fixed Animated Background */
        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: #0f172a;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 12s infinite ease-in-out alternate;
        }
        .orb-1 { width: 500px; height: 500px; background: rgba(245, 158, 11, 0.15); top: -10%; left: -10%; }
        .orb-2 { width: 600px; height: 600px; background: rgba(59, 130, 246, 0.15); bottom: -20%; right: -10%; animation-delay: -4s; }
        .orb-3 { width: 400px; height: 400px; background: rgba(16, 185, 129, 0.1); top: 40%; left: 50%; transform: translate(-50%, -50%); animation-delay: -8s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -40px) scale(1.1); }
        }

        .container { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(20px);
            width: 100%; 
            max-width: 580px; 
            padding: 3.5rem 3rem; 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1); 
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--primary), #fbbf24);
        }

        .logo { 
            width: 64px; 
            height: 64px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            border-radius: 18px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2rem; 
            color: #fff; 
            margin: 0 auto 1.5rem; 
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4); 
            transform: rotate(-5deg);
        }

        h1 { 
            text-align: center; 
            margin: 0 0 0.5rem; 
            font-weight: 900; 
            font-size: 2.2rem; 
            letter-spacing: -0.03em; 
            color: var(--text-dark);
        }

        p.subtitle { 
            text-align: center; 
            color: var(--text-muted); 
            margin: 0 0 2.5rem; 
            font-size: 1.05rem; 
            line-height: 1.5;
        }
        
        .step-container { 
            display: none; 
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .step-container.active { display: block; }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .google-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
            min-height: 50px;
        }

        /* Workspace Cards */
        .workspace-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        .workspace-list::-webkit-scrollbar { width: 6px; }
        .workspace-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .workspace-card {
            background: #fff;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .workspace-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.15);
        }
        
        .workspace-card::after {
            content: '\f105';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #cbd5e1;
            transition: color 0.2s;
        }
        .workspace-card:hover::after { color: var(--primary); }

        .ws-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.5rem; padding-right: 2rem; }
        .ws-header h4 { margin: 0; font-size: 1.2rem; font-weight: 800; color: var(--text-dark); }
        
        .ws-role { font-size: 0.75rem; font-weight: 800; padding: 0.25rem 0.6rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
        .role-owner { background: #fef3c7; color: #d97706; }
        .role-viewer { background: #e0e7ff; color: #4338ca; }
        
        .ws-footer { font-size: 0.9rem; color: var(--text-muted); display: flex; gap: 1rem; }
        .ws-footer span { display: flex; align-items: center; gap: 0.3rem; }

        .btn-create {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: var(--primary-dark);
            border: 2px dashed var(--primary);
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .btn-create:hover {
            background: var(--primary-light);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: 16px;
        }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: #e2e8f0; display:flex; align-items:center; justify-content:center; color:#64748b; font-weight:700; font-size:1.2rem; }
        .user-info h3 { margin: 0 0 0.2rem; font-size: 1.1rem; color: #0f172a; }
        .user-info p { margin: 0; font-size: 0.9rem; color: #64748b; }

        /* Loading Spinner */
        #loading_state {
            text-align: center;
            padding: 3rem 0;
            display: none;
        }
        .spinner {
            font-size: 2.5rem;
            color: var(--primary);
            animation: spin 1s infinite linear;
            margin-bottom: 1rem;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="bg-animated">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>
    <div class="container">
        <div style="display:flex; align-items:center; justify-content:center; gap:1.2rem; margin-bottom:0.5rem; transform: scale(1.1); margin-top: 1rem;">
            <img src="http://localhost:3000/imgs/ICON.png" alt="DOMATION Logo" style="width: 4.8rem; height: 4.8rem; object-fit: contain; flex-shrink: 0;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2991/2991148.png'">
            <div style="display: flex; flex-direction: column; justify-content: center; text-align: left;">
                <h1 style="margin: 0; font-size: 2.8rem; font-weight: 900; color: #0f172a; line-height: 1; letter-spacing: -0.02em; text-align: left;">DOMATION</h1>
                <p style="margin: 0.4rem 0 0 0; font-size: 0.9rem; font-weight: 800; color: #64748b; line-height: 1; letter-spacing: 0.15em; display: flex; gap: 0.4rem; text-transform: uppercase;">
                    <span style="color: #f59e0b;">/</span> REALTIME META REPORT
                </p>
            </div>
        </div>
        <p class="subtitle" id="main_subtitle" style="margin-bottom:2.5rem; margin-top:1.5rem;">Đăng nhập để xem các dự án của bạn</p>

        <!-- BƯỚC 1: ĐĂNG NHẬP GOOGLE -->
        <div id="step_1" class="step-container active">
            <div style="text-align:center; padding: 2rem; background: #f8fafc; border-radius: 20px; border: 1px dashed #cbd5e1;">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" alt="Google" style="width:70px; margin-bottom:1rem; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));">
                <h2 style="margin:0 0 0.5rem; font-size:1.6rem; font-weight:800;">Xác Thực Tài Khoản</h2>
                <p style="color:#64748b; font-size:1rem; margin:0;">Sử dụng tài khoản Google để truy cập an toàn.</p>
                
                <div class="google-btn-wrapper" id="google_btn_render_area"></div>
            </div>
            
            <p id="google_error_text" style="color:#ef4444; font-size:0.9rem; text-align:center; display:none; margin-top:1rem;">
                <i class="fa-solid fa-circle-exclamation"></i> Lỗi: Chưa cấu hình GOOGLE_CLIENT_ID trong config_env.js.
            </p>
        </div>

        <!-- BƯỚC 2: LOADING -->
        <div id="loading_state" class="step-container">
            <i class="fa-solid fa-circle-notch spinner"></i>
            <h3 style="margin:0; color:#334155;">Đang tải danh sách dự án...</h3>
        </div>

        <!-- BƯỚC 3: HIỂN THỊ DANH SÁCH WORKSPACE -->
        <div id="step_2" class="step-container">
            <div class="user-profile">
                <div class="user-avatar" id="user_avatar_char">U</div>
                <div class="user-info">
                    <h3 id="user_name_display">User Name</h3>
                    <p id="user_email_display">user@gmail.com</p>
                </div>
            </div>

            <div class="workspace-list" id="workspace_list_container">
                <!-- Thẻ Workspace sẽ được chèn vào đây -->
            </div>

            <button class="btn-create" onclick="window.location.href='/register'">
                <i class="fa-solid fa-plus"></i> Khởi tạo Workspace mới
            </button>
        </div>

    </div>

    <script>
        window.onload = function() {
            // Kiểm tra xem đã có Session đăng nhập chưa (Auto Login)
            try {
                const session = JSON.parse(localStorage.getItem("dom_auth_v1") || "null");
                if (session && session.u && session.u.email) {
                    const u = session.u;
                    document.getElementById('user_name_display').innerText = u.name || u.email.split('@')[0];
                    document.getElementById('user_email_display').innerText = u.email;
                    document.getElementById('user_avatar_char').innerText = u.email.charAt(0).toUpperCase();
                    if (u.picture) {
                        document.getElementById('user_avatar_char').innerHTML = `<img src="${u.picture}" style="width:100%;height:100%;border-radius:50%;">`;
                    }
                    
                    document.getElementById('main_subtitle').innerText = "Chọn dự án để bắt đầu";
                    showStep('loading_state');
                    fetchUserTenants(u.email);
                    return; // Đã đăng nhập nên không cần render nút Google nữa
                }
            } catch(e) {}

            if (!window.APP_CONFIG.GOOGLE_CLIENT_ID) {
                document.getElementById('google_error_text').style.display = 'block';
            } else {
                google.accounts.id.initialize({
                    client_id: window.APP_CONFIG.GOOGLE_CLIENT_ID,
                    callback: handleGoogleLogin,
                    auto_select: true
                });
                
                google.accounts.id.renderButton(
                    document.getElementById("google_btn_render_area"),
                    { theme: "outline", size: "large", shape: "pill", type: "standard", text: "signin_with", logo_alignment: "left" }
                );
            }
        };

        function showStep(stepId) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        async function handleGoogleLogin(response) {
            try {
                // Decode JWT
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                const payload = JSON.parse(jsonPayload);
                if (payload.email) {
                    try {
                        localStorage.setItem("dom_auth_v1", JSON.stringify({
                            u: {
                                email: payload.email,
                                name: payload.name || payload.email.split('@')[0],
                                picture: payload.picture || ""
                            },
                            ts: Date.now()
                        }));
                    } catch(e) {}

                    // Update Profile UI
                    document.getElementById('user_name_display').innerText = payload.name || payload.email.split('@')[0];
                    document.getElementById('user_email_display').innerText = payload.email;
                    document.getElementById('user_avatar_char').innerText = payload.email.charAt(0).toUpperCase();
                    if (payload.picture) {
                        document.getElementById('user_avatar_char').innerHTML = `<img src="${payload.picture}" style="width:100%;height:100%;border-radius:50%;">`;
                    }
                    
                    document.getElementById('main_subtitle').innerText = "Chọn dự án để bắt đầu";
                    showStep('loading_state');

                    // Call API to fetch tenants
                    fetchUserTenants(payload.email);
                }
            } catch (e) {
                console.error("Lỗi xác thực:", e);
                alert("Lỗi đọc dữ liệu từ Google.");
                showStep('step_1');
            }
        }

        async function fetchUserTenants(email) {
            try {
                const res = await fetch(`${window.APP_CONFIG.SAAS_API_URL}?action=get_user_tenants&email=${encodeURIComponent(email)}`);
                const data = await res.json();
                
                if (!data.ok) throw new Error(data.error);

                if (!data.data || data.data.length === 0) {
                    // Không có tenant nào -> Tự động chuyển hướng sang trang tạo mới
                    window.location.href = "/register";
                    return;
                }

                // Có tenant -> Render danh sách
                renderTenants(data.data);
                showStep('step_2');

            } catch (e) {
                console.error("Lỗi tải tenants:", e);
                alert("Lỗi kết nối máy chủ: " + e.message);
                showStep('step_1');
            }
        }

        function renderTenants(tenants) {
            const container = document.getElementById('workspace_list_container');
            let html = '';

            tenants.forEach(t => {
                const isOwner = t.role === 'owner';
                const roleClass = isOwner ? 'role-owner' : 'role-viewer';
                const roleText = isOwner ? 'Chủ sở hữu' : 'Thành viên';
                
                const statusColor = t.status === 'active' ? '#10b981' : (t.status === 'trial' ? '#f59e0b' : '#ef4444');
                const statusLabel = t.status.toUpperCase();
                
                let expireText = "Không xác định";
                if (t.expires_at) {
                    const d = new Date(t.expires_at);
                    expireText = isNaN(d) ? t.expires_at : d.toLocaleDateString("vi-VN", { day: '2-digit', month: '2-digit', year: 'numeric' });
                }

                html += `
                    <div class="workspace-card" onclick="window.location.href='/${t.slug}'">
                        <div class="ws-header">
                            <h4>${t.name}</h4>
                            <span class="ws-role ${roleClass}">${roleText}</span>
                        </div>
                        <div class="ws-footer" style="flex-wrap: wrap;">
                            <span style="min-width:120px;"><i class="fa-solid fa-link"></i> /${t.slug}</span>
                            <span style="color:${statusColor}; font-weight:600;"><i class="fa-solid fa-circle" style="font-size:0.6rem;"></i> ${statusLabel}</span>
                            <span style="margin-left: auto; color:#64748b; font-size: 0.85rem;"><i class="fa-regular fa-calendar-xmark"></i> Hết hạn: ${expireText}</span>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
